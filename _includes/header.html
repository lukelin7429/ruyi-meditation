<header class="site-header">
  <div class="header-inner">
    <a href="{{ '/' | relative_url }}" class="brand">
      <img src="{{ '/logos/ruyi-logo-green.png' | relative_url }}" alt="Ru-Yi Meditation Center" class="brand-logo">
      <span class="brand-name">Ru-Yi <em>Meditation Center</em></span>
    </a>
    <nav class="site-nav" aria-label="Primary">
      <a href="{{ '/' | relative_url }}"{% if page.url == '/' %} class="active"{% endif %}>Home</a>
      <a href="{{ '/about/' | relative_url }}"{% if page.url contains '/about' %} class="active"{% endif %}>About</a>
      <a href="{{ '/columns/' | relative_url }}"{% if page.url contains '/columns' %} class="active"{% endif %}>Columns</a>
      <a href="{{ '/dharma/' | relative_url }}"{% if page.url contains '/dharma' or page.url contains '/discourses' or page.url contains '/courses' or page.url contains '/forbearance' or page.url contains '/life-questions' or page.url contains '/meditation' or page.url contains '/sutras' %} class="active"{% endif %}>Dharma</a>
      <a href="{{ '/english-school/' | relative_url }}"{% if page.url contains '/english-school' %} class="active"{% endif %}>English School</a>
      <a href="{{ '/community/' | relative_url }}"{% if page.url contains '/community' %} class="active"{% endif %}>Community</a>
    </nav>
    <div class="header-actions">
      <a href="https://members.ruyimeditation.org/signup" class="nav-signup">Sign Up</a>
      <button type="button" class="nav-search-btn" id="siteSearchBtn" aria-label="Search this site" title="Search (press /)">
        <svg viewBox="0 0 24 24" width="17" height="17" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.5" y2="16.5"/></svg>
        <span class="nav-search-label">Search</span>
        <kbd>/</kbd>
      </button>
      <button type="button" class="nav-hamburger" id="navHamburger" aria-label="Open menu" aria-expanded="false">
        <span></span><span></span><span></span>
      </button>
    </div>
  </div>
</header>

<!-- Mobile nav drawer — lives outside <header> so position:fixed escapes backdrop-filter stacking context -->
<div class="mobile-nav-drawer" id="mobileNavDrawer" aria-hidden="true">
  <nav aria-label="Mobile navigation">
    <a href="{{ '/' | relative_url }}"{% if page.url == '/' %} class="active"{% endif %}>Home</a>
    <a href="{{ '/about/' | relative_url }}"{% if page.url contains '/about' %} class="active"{% endif %}>About</a>
    <a href="{{ '/columns/' | relative_url }}"{% if page.url contains '/columns' %} class="active"{% endif %}>Columns</a>
    <a href="{{ '/dharma/' | relative_url }}"{% if page.url contains '/dharma' or page.url contains '/discourses' or page.url contains '/courses' or page.url contains '/forbearance' or page.url contains '/life-questions' or page.url contains '/meditation' or page.url contains '/sutras' %} class="active"{% endif %}>Dharma</a>
    <a href="{{ '/english-school/' | relative_url }}"{% if page.url contains '/english-school' %} class="active"{% endif %}>English School</a>
    <a href="{{ '/community/' | relative_url }}"{% if page.url contains '/community' %} class="active"{% endif %}>Community</a>
    <a href="https://members.ruyimeditation.org/signup">Sign Up · Ask a Question</a>
  </nav>
</div>

<script>
(function(){
  var btn = document.getElementById('navHamburger');
  var drawer = document.getElementById('mobileNavDrawer');
  if (!btn || !drawer) return;
  function openMenu(){
    drawer.classList.add('is-open');
    drawer.setAttribute('aria-hidden','false');
    btn.classList.add('is-open');
    btn.setAttribute('aria-expanded','true');
    document.body.classList.add('nav-overlay-open');
  }
  function closeMenu(){
    drawer.classList.remove('is-open');
    drawer.setAttribute('aria-hidden','true');
    btn.classList.remove('is-open');
    btn.setAttribute('aria-expanded','false');
    document.body.classList.remove('nav-overlay-open');
  }
  btn.addEventListener('click', function(e){
    e.stopPropagation();
    drawer.classList.contains('is-open') ? closeMenu() : openMenu();
  });
  document.addEventListener('click', function(e){
    if (drawer.classList.contains('is-open') && !drawer.contains(e.target) && !btn.contains(e.target)){
      closeMenu();
    }
  });
})();
</script>
